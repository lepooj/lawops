services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawops
      POSTGRES_PASSWORD: lawops_dev
      POSTGRES_DB: lawops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawops"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
